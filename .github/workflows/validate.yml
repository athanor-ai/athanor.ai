name: Validate website data

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate data.js
        run: python3 test_data.py

      - name: Check index.html references data.js
        run: grep -q 'src="data.js"' index.html

      - name: Check no hardcoded CALIBRATOR_DATA in index.html
        run: |
          if grep -q 'const CALIBRATOR_DATA = {' index.html; then
            echo "FAIL: index.html still has hardcoded data. Use data.js instead."
            exit 1
          fi
